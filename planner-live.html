<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb; --paper: #fefcf7; --ink: #1a1a1a; --ink-light: #6b6560;
    --accent: #c85a2a; --accent-soft: #f0e4db; --green: #3a7a3a;
    --line: #e8e3d8; --shadow: rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Gowun Dodum', sans-serif; color: var(--ink); min-height: 100vh; padding: 24px 16px 80px; }
  .container { max-width: 700px; margin: 0 auto; }

  .tab-bar { display:flex; align-items:flex-end; gap:0; margin-bottom:0; overflow-x:auto; scrollbar-width:none; }
  .tab-bar::-webkit-scrollbar { display:none; }
  .tab { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.08em; padding:8px 16px 10px; border-radius:10px 10px 0 0; cursor:pointer; white-space:nowrap; border:1.5px solid transparent; border-bottom:none; transition:all .15s; position:relative; bottom:-1px; color:var(--ink-light); background:transparent; }
  .tab:hover { color:var(--ink); background:rgba(255,255,255,.5); }
  .tab.active { background:var(--paper); color:var(--ink); border-color:var(--line); border-bottom:2px solid var(--paper); font-weight:700; z-index:1; }
  .tab.today-tab.active { color:var(--accent); }
  .tab .tab-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--accent); margin-right:5px; vertical-align:middle; margin-bottom:1px; }
  .tab.past-tab .tab-dot { background:var(--ink-light); }
  .tab-done-badge { font-size:9px; background:var(--green); color:#fff; border-radius:3px; padding:1px 4px; margin-left:5px; opacity:.8; }

  .day-panel { display:none; }
  .day-panel.active { display:block; }

  .header { background:var(--paper); border:1.5px solid var(--line); border-top:none; border-radius:0 12px 12px 12px; padding:16px 20px 14px; margin-bottom:14px; display:flex; align-items:center; gap:14px; }
  .header-left { flex:1; }
  .header-summary { font-family:'Space Mono',monospace; font-size:10px; color:var(--ink-light); text-align:right; line-height:1.6; }
  .header-summary span { color:var(--accent); font-weight:700; }
  .planner-title-wrap { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
  .planner-potato { font-size:36px; animation:potatoBounce 2.5s ease-in-out infinite; display:inline-block; }
  @keyframes potatoBounce { 0%,100%{transform:translateY(0) rotate(-5deg);} 50%{transform:translateY(-5px) rotate(4deg);} }
  .planner-title-text { display:flex; flex-direction:column; gap:2px; }
  .planner-title-main { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; letter-spacing:.08em; color:var(--ink); line-height:1.1; }
  .planner-title-date { font-family:'Space Mono',monospace; font-size:10px; color:var(--ink-light); letter-spacing:.08em; }
  .header-progress { margin-top:8px; }
  .progress-track { height:4px; background:var(--line); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .4s ease; }
  .progress-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--ink-light); margin-top:3px; letter-spacing:.06em; }

  .past-notice { background:#1a1a1a; border-radius:8px; padding:8px 14px; margin-bottom:14px; font-family:'Space Mono',monospace; font-size:10px; color:rgba(255,255,255,.5); letter-spacing:.06em; }
  .past-notice strong { color:rgba(255,255,255,.8); }

  .ai-section { background:rgba(26,26,26,.88); border-radius:12px; padding:14px 16px; margin-bottom:14px; }
  .ai-label { font-family:'Space Mono',monospace; font-size:10px; color:var(--accent); letter-spacing:.15em; text-transform:uppercase; margin-bottom:9px; }
  .ai-input-row { display:flex; gap:8px; align-items:flex-end; }
  .ai-input { flex:1; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:8px; padding:8px 12px; color:#fff; font-family:'Gowun Dodum',sans-serif; font-size:14px; outline:none; resize:none; line-height:1.5; min-height:38px; max-height:100px; transition:border-color .2s; }
  .ai-input::placeholder { color:rgba(255,255,255,.3); }
  .ai-input:focus { border-color:var(--accent); }
  .ai-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 13px; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; cursor:pointer; letter-spacing:.05em; white-space:nowrap; height:38px; transition:opacity .2s,transform .1s; }
  .ai-btn:hover{opacity:.85} .ai-btn:active{transform:scale(.97)} .ai-btn:disabled{opacity:.4;cursor:not-allowed}
  .ai-status { font-size:11px; color:rgba(255,255,255,.4); font-family:'Space Mono',monospace; margin-top:7px; min-height:14px; }
  .ai-status.loading{color:var(--accent)} .ai-status.done{color:#7acc7a}

  .section { background:var(--paper); border-radius:12px; padding:15px 17px; margin-bottom:11px; box-shadow:0 2px 8px var(--shadow); }
  .section.readonly { opacity:.85; pointer-events:none; }
  .section-header { display:flex; align-items:center; gap:8px; margin-bottom:11px; }
  .section-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); flex-shrink:0; }
  .section-dot.green{background:var(--green)} .section-dot.blue{background:#4a7ab5} .section-dot.purple{background:#7a5ab5}
  .section-title { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; }
  .section-count { font-family:'Space Mono',monospace; font-size:10px; color:var(--ink-light); margin-left:auto; }
  .ai-tag { display:inline-block; font-family:'Space Mono',monospace; font-size:9px; background:var(--accent-soft); color:var(--accent); padding:2px 5px; border-radius:4px; letter-spacing:.08em; margin-left:5px; }
  .divider { height:1px; background:var(--line); margin:0 0 9px; }

  .todo-list,.backlog-list,.week-grid { display:flex; flex-direction:column; gap:4px; }
  .todo-item,.backlog-item,.week-item { display:flex; align-items:flex-start; gap:9px; padding:5px 3px; border-radius:6px; transition:background .15s; }
  .todo-item:hover,.backlog-item:hover,.week-item:hover { background:var(--line); }
  .todo-item input[type="checkbox"],.week-cb { appearance:none; -webkit-appearance:none; width:15px; height:15px; border:1.5px solid #c8c0b4; border-radius:4px; cursor:pointer; flex-shrink:0; margin-top:3px; transition:all .15s; position:relative; }
  .todo-item input[type="checkbox"]:checked{background:var(--accent);border-color:var(--accent)}
  .todo-item input[type="checkbox"]:checked::after,.week-cb:checked::after { content:'✓'; position:absolute; color:white; font-size:9px; top:50%; left:50%; transform:translate(-50%,-50%); }
  .week-cb:checked{background:var(--green);border-color:var(--green)}
  .todo-text,.backlog-text,.week-label { flex:1; font-size:14px; line-height:1.5; color:var(--ink); outline:none; border:none; background:transparent; font-family:'Gowun Dodum',sans-serif; resize:none; padding:0; min-height:21px; }
  .todo-text.done,.week-label.done { text-decoration:line-through; color:var(--ink-light); }
  .backlog-bullet { width:6px; height:6px; border-radius:50%; background:#4a7ab5; flex-shrink:0; margin-top:8px; }
  .todo-del,.backlog-del { opacity:0; cursor:pointer; color:var(--ink-light); font-size:12px; padding:0 2px; background:none; border:none; line-height:1; margin-top:3px; transition:opacity .15s,color .15s; }
  .todo-item:hover .todo-del,.backlog-item:hover .backlog-del{opacity:1}
  .todo-del:hover,.backlog-del:hover{color:var(--accent)}
  .add-row { display:flex; align-items:center; gap:9px; padding:5px 3px; cursor:text; border-radius:6px; transition:background .15s; margin-top:2px; }
  .add-row:hover{background:var(--line)}
  .add-row input { flex:1; border:none; background:transparent; outline:none; font-family:'Gowun Dodum',sans-serif; font-size:14px; color:var(--ink); }
  .add-row input::placeholder{color:var(--ink-light)}
  .add-icon { width:15px; height:15px; border:1.5px dashed #c8c0b4; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:9px; color:#c8c0b4; flex-shrink:0; }
  .memo-area { width:100%; border:none; background:transparent; outline:none; font-family:'Gowun Dodum',sans-serif; font-size:14px; color:var(--ink); line-height:1.8; resize:none; min-height:68px; }
  .memo-area::placeholder{color:var(--ink-light)}

  .save-bar { position:fixed; bottom:16px; right:16px; font-family:'Space Mono',monospace; font-size:10px; color:var(--ink-light); background:var(--paper); padding:5px 12px; border-radius:20px; box-shadow:0 2px 10px var(--shadow); opacity:0; transition:opacity .3s; z-index:10; }
  .save-bar.show{opacity:1}

  .rollover-trigger-btn { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.05em; background:var(--accent-soft); color:var(--accent); border:1.5px solid rgba(200,90,42,.25); border-radius:8px; padding:7px 13px; cursor:pointer; font-weight:700; transition:all .15s; display:flex; align-items:center; gap:6px; width:100%; margin-bottom:14px; }
  .rollover-trigger-btn:hover{background:var(--accent);color:#fff}
  .rollover-count-badge { background:var(--accent); color:#fff; border-radius:10px; padding:1px 7px; font-size:9px; margin-left:auto; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal-box { background:var(--paper); border-radius:16px; border:1.5px solid var(--line); max-width:460px; width:100%; box-shadow:0 12px 40px rgba(0,0,0,.15); transform:translateY(10px); transition:transform .2s; }
  .modal-overlay.open .modal-box{transform:translateY(0)}
  .modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--line)}
  .modal-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700}
  .modal-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink-light);margin-top:3px}
  .modal-body{padding:16px 20px;max-height:50vh;overflow-y:auto}
  .rollover-item { display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:7px; cursor:pointer; transition:background .15s; margin-bottom:4px; }
  .rollover-item:hover{background:var(--line)}
  .rollover-item input[type="checkbox"] { appearance:none; -webkit-appearance:none; width:15px; height:15px; border:1.5px solid #c8c0b4; border-radius:4px; cursor:pointer; flex-shrink:0; transition:all .15s; position:relative; }
  .rollover-item input[type="checkbox"]:checked{background:var(--accent);border-color:var(--accent)}
  .rollover-item input[type="checkbox"]:checked::after{content:'✓';position:absolute;color:white;font-size:9px;top:50%;left:50%;transform:translate(-50%,-50%)}
  .rollover-label{font-size:13px;flex:1}
  .rollover-from{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink-light)}
  .modal-footer{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
  .modal-btn{font-family:'Space Mono',monospace;font-size:10px;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-weight:700;transition:opacity .15s}
  .modal-btn:hover{opacity:.8}
  .modal-btn-primary{background:var(--accent);color:#fff}
  .modal-btn-ghost{background:var(--line);color:var(--ink)}

  .stats-panel{display:none} .stats-panel.active{display:block}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
  .stat-card{background:var(--paper);border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px var(--shadow);border:1.5px solid var(--line)}
  .stat-card-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink-light);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
  .stat-card-val{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;line-height:1}
  .stat-card-val.accent{color:var(--accent)} .stat-card-val.green{color:var(--green)}
  .stat-card-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink-light);margin-top:4px}
  .week-bar-chart{background:var(--paper);border-radius:12px;padding:15px 17px;box-shadow:0 2px 8px var(--shadow);border:1.5px solid var(--line);margin-bottom:11px}
  .week-bar-title{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
  .bar-chart-rows{display:flex;flex-direction:column;gap:8px}
  .bar-row{display:flex;align-items:center;gap:10px}
  .bar-day-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink-light);width:28px;flex-shrink:0}
  .bar-track{flex:1;height:18px;background:var(--line);border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s ease}
  .bar-fill.full{background:var(--green)}
  .bar-stat{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink-light);width:36px;text-align:right;flex-shrink:0}
  .week-review-section{background:var(--paper);border-radius:12px;padding:15px 17px;box-shadow:0 2px 8px var(--shadow);border:1.5px solid var(--line)}
  .week-incomplete-list{display:flex;flex-direction:column;gap:5px;margin-top:10px}
  .wk-item{display:flex;align-items:center;gap:9px;padding:5px 6px;border-radius:6px;font-size:13px}
  .wk-item-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .wk-item-from{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink-light);margin-left:auto}
  .wk-move-btn{font-family:'Space Mono',monospace;font-size:9px;color:var(--accent);background:var(--accent-soft);border:none;border-radius:4px;padding:2px 7px;cursor:pointer;transition:all .15s}
  .wk-move-btn:hover{background:var(--accent);color:#fff}
</style>
</head>
<body>
<div class="container">
  <div class="tab-bar" id="tabBar"></div>
  <div id="panels"></div>
  <div id="statsPanel" class="stats-panel"></div>
</div>

<div class="modal-overlay" id="rolloverModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">↩ 미완료 항목 이월</div>
      <div class="modal-sub" id="rolloverModalSub"></div>
    </div>
    <div class="modal-body" id="rolloverModalBody"></div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-ghost" onclick="closeRollover()">취소</button>
      <button class="modal-btn modal-btn-primary" onclick="confirmRollover()">선택 항목 이월 →</button>
    </div>
  </div>
</div>

<div class="save-bar" id="saveBar">저장됨</div>

<script>
const DAYS_EN=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
const DAYS_KO=['일','월','화','수','목','금','토'];

function dateKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dateLabel(d){return`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} (${DAYS_KO[d.getDay()]})`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const today=new Date(); today.setHours(0,0,0,0);
const todayKey=dateKey(today);
const yesterday=new Date(today); yesterday.setDate(today.getDate()-1);
const yesterdayKey=dateKey(yesterday);

const STORE_PREFIX='planner-day-';
function loadDay(key){const raw=localStorage.getItem(STORE_PREFIX+key);if(raw)try{return JSON.parse(raw);}catch(e){}return{today:[],backlog:[],week:[],memo:''};}
function saveDay(key,data){localStorage.setItem(STORE_PREFIX+key,JSON.stringify(data));const bar=document.getElementById('saveBar');bar.classList.add('show');clearTimeout(saveDay._t);saveDay._t=setTimeout(()=>bar.classList.remove('show'),1400);}
function getAllSavedKeys(){const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(STORE_PREFIX))keys.push(k.replace(STORE_PREFIX,''));}return keys.sort().reverse();}

let activeKey=todayKey;
function buildDateList(){return[...new Set([todayKey,yesterdayKey,...getAllSavedKeys()])].sort().reverse();}
function keyToDate(key){const[y,m,d]=key.split('-').map(Number);return new Date(y,m-1,d);}

function renderTabs(){
  const tabBar=document.getElementById('tabBar');tabBar.innerHTML='';
  buildDateList().forEach(key=>{
    const d=keyToDate(key),isToday=key===todayKey,isYesterday=key===yesterdayKey;
    const data=loadDay(key),doneCnt=data.today.filter(t=>t.done).length,totalCnt=data.today.length;
    const tab=document.createElement('div');
    tab.className=`tab ${isToday?'today-tab':'past-tab'} ${key===activeKey?'active':''}`;
    let label=dateLabel(d);
    if(isToday)label=`오늘 · ${label}`;
    else if(isYesterday)label=`어제 · ${label}`;
    const badge=(!isToday&&totalCnt>0)?`<span class="tab-done-badge">${doneCnt}/${totalCnt}</span>`:'';
    tab.innerHTML=`<span class="tab-dot"></span>${label}${badge}`;
    tab.onclick=()=>switchTab(key);
    tabBar.appendChild(tab);
  });
  const st=document.createElement('div');
  st.className=`tab past-tab ${activeKey==='__stats__'?'active':''}`;
  st.innerHTML=`<span class="tab-dot" style="background:#4a7ab5"></span>주간 리뷰`;
  st.onclick=()=>switchTab('__stats__');
  tabBar.appendChild(st);
}

function switchTab(key){
  activeKey=key; renderTabs();
  if(key==='__stats__'){
    document.querySelectorAll('.day-panel').forEach(p=>p.style.display='none');
    renderStatsPanel();
    document.getElementById('statsPanel').classList.add('active');
  } else {
    document.getElementById('statsPanel').classList.remove('active');
    renderPanels();
  }
}

function renderPanels(){
  const c=document.getElementById('panels');c.innerHTML='';
  document.getElementById('statsPanel').classList.remove('active');
  buildDateList().forEach(key=>{
    const p=buildPanel(key);c.appendChild(p);
    if(key!==activeKey)p.style.display='none';
  });
  setTimeout(renderRolloverTrigger,20);
}

function buildPanel(key){
  const d=keyToDate(key),isToday=key===todayKey,isPast=key<todayKey;
  const data=loadDay(key);
  const doneCnt=data.today.filter(t=>t.done).length,totalCnt=data.today.length;
  const panel=document.createElement('div');
  panel.className='day-panel active'; panel.id=`panel-${key}`;
  panel.innerHTML=`
    <div class="header">
      <div class="header-left">
        <div class="planner-title-wrap">
          <span class="planner-potato">🥔</span>
          <div class="planner-title-text">
            <div class="planner-title-main">DAILY PLANNER</div>
            <div class="planner-title-date">${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${DAYS_EN[d.getDay()]}</div>
          </div>
        </div>
        ${totalCnt>0?`<div class="header-progress"><div class="progress-track"><div class="progress-fill" style="width:${Math.round(doneCnt/totalCnt*100)}%"></div></div><div class="progress-label">${Math.round(doneCnt/totalCnt*100)}% 완료</div></div>`:''}
      </div>
      ${totalCnt>0?`<div class="header-summary">할 일 <span>${doneCnt} / ${totalCnt}</span> 완료<br>${data.backlog.length>0?`백로그 <span>${data.backlog.length}</span>개`:''}</div>`:''}
    </div>
    ${isPast?`<div class="past-notice">📅 <strong>과거 기록</strong> — 읽기 전용입니다</div>`:''}
    ${isToday?`<div id="rolloverTriggerWrap"></div>`:''}
    ${isToday?`
    <div class="ai-section">
      <div class="ai-label">✦ Claude AI — 오늘 할 일 정리</div>
      <div class="ai-input-row">
        <textarea class="ai-input" id="aiPrompt" placeholder="오늘 상황을 자유롭게 적어줘..." rows="1"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();runAI()}"></textarea>
        <button class="ai-btn" id="aiBtn" onclick="runAI()">채워줘 →</button>
      </div>
      <div class="ai-status" id="aiStatus">Enter 또는 버튼으로 실행</div>
    </div>`:''}
    <div class="section ${isPast?'readonly':''}">
      <div class="section-header">
        <div class="section-dot"></div>
        <div class="section-title">${isToday?'오늘':'이날'} 할 일<span class="ai-tag" id="today-ai-tag-${key}" style="display:none">AI</span></div>
        <div class="section-count" id="today-count-${key}">${doneCnt} / ${totalCnt}</div>
      </div>
      <div class="divider"></div>
      <div class="todo-list" id="today-list-${key}"></div>
      ${isToday?`<div class="add-row" onclick="document.getElementById('today-add-${key}').focus()"><div class="add-icon">+</div><input type="text" id="today-add-${key}" placeholder="항목 추가..." onkeydown="addTodo(event,'${key}')"></div>`:''}
    </div>
    <div class="section ${isPast?'readonly':''}">
      <div class="section-header">
        <div class="section-dot blue"></div>
        <div class="section-title">앞으로 할 일<span class="ai-tag" id="backlog-ai-tag-${key}" style="display:none">AI</span></div>
        <div class="section-count" id="backlog-count-${key}">${data.backlog.length}개</div>
      </div>
      <div class="divider"></div>
      <div class="backlog-list" id="backlog-list-${key}"></div>
      ${isToday?`<div class="add-row" onclick="document.getElementById('backlog-add-${key}').focus()"><div class="add-icon">+</div><input type="text" id="backlog-add-${key}" placeholder="백로그 추가..." onkeydown="addBacklog(event,'${key}')"></div>`:''}
    </div>
    <div class="section ${isPast?'readonly':''}">
      <div class="section-header">
        <div class="section-dot green"></div>
        <div class="section-title">이번 주 체크리스트</div>
        <div class="section-count" id="week-count-${key}">${data.week.filter(w=>w.done).length} / ${data.week.length}</div>
      </div>
      <div class="divider"></div>
      <div class="week-grid" id="week-list-${key}"></div>
      ${isToday?`<div class="add-row" onclick="document.getElementById('week-add-${key}').focus()"><div class="add-icon">+</div><input type="text" id="week-add-${key}" placeholder="체크리스트 추가..." onkeydown="addWeek(event,'${key}')"></div>`:''}
    </div>
    <div class="section ${isPast?'readonly':''}">
      <div class="section-header"><div class="section-dot purple"></div><div class="section-title">메모</div></div>
      <div class="divider"></div>
      ${isToday
        ?`<textarea class="memo-area" id="memo-${key}" placeholder="자유롭게 기록..." oninput="onMemoInput('${key}',this.value)">${esc(data.memo||'')}</textarea>`
        :`<div style="font-size:14px;line-height:1.8;color:var(--ink);white-space:pre-wrap;min-height:40px">${esc(data.memo||'')}<span style="color:var(--ink-light)">${!data.memo?'기록 없음':''}</span></div>`
      }
    </div>`;
  renderTodayList(key,data); renderBacklogList(key,data); renderWeekList(key,data);
  return panel;
}

function renderTodayList(key,data){
  const l=document.getElementById(`today-list-${key}`);if(!l)return;
  const isToday=key===todayKey; l.innerHTML='';
  data.today.forEach((item,i)=>{
    const d=document.createElement('div');d.className='todo-item';
    if(isToday){
      d.innerHTML=`<input type="checkbox" ${item.done?'checked':''} onchange="toggleTodo('${key}',${i})">
        <textarea class="todo-text ${item.done?'done':''}" rows="1"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';onTodoEdit('${key}',${i},this.value)"
          onkeydown="if(event.key==='Backspace'&&this.value===''){event.preventDefault();removeTodo('${key}',${i})}"
        >${esc(item.text)}</textarea>
        <button class="todo-del" onclick="removeTodo('${key}',${i})">✕</button>`;
    } else {
      d.innerHTML=`<input type="checkbox" ${item.done?'checked':''} disabled style="cursor:default"><div class="todo-text ${item.done?'done':''}" style="cursor:default">${esc(item.text)}</div>`;
    }
    l.appendChild(d);
    if(isToday){const ta=d.querySelector('textarea');if(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}}
  });
  const cnt=document.getElementById(`today-count-${key}`);
  if(cnt)cnt.textContent=`${data.today.filter(t=>t.done).length} / ${data.today.length}`;
}

function renderBacklogList(key,data){
  const l=document.getElementById(`backlog-list-${key}`);if(!l)return;
  const isToday=key===todayKey; l.innerHTML='';
  data.backlog.forEach((item,i)=>{
    const d=document.createElement('div');d.className='backlog-item';
    if(isToday){
      d.innerHTML=`<div class="backlog-bullet"></div>
        <textarea class="backlog-text" rows="1"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';onBacklogEdit('${key}',${i},this.value)"
          onkeydown="if(event.key==='Backspace'&&this.value===''){event.preventDefault();removeBacklog('${key}',${i})}"
        >${esc(item)}</textarea>
        <button class="backlog-del" onclick="removeBacklog('${key}',${i})">✕</button>`;
    } else {
      d.innerHTML=`<div class="backlog-bullet"></div><div class="backlog-text" style="cursor:default">${esc(item)}</div>`;
    }
    l.appendChild(d);
    if(isToday){const ta=d.querySelector('textarea');if(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}}
  });
  const cnt=document.getElementById(`backlog-count-${key}`);
  if(cnt)cnt.textContent=`${data.backlog.length}개`;
}

function renderWeekList(key,data){
  const l=document.getElementById(`week-list-${key}`);if(!l)return;
  const isToday=key===todayKey; l.innerHTML='';
  data.week.forEach((item,i)=>{
    const d=document.createElement('div');d.className='week-item';
    if(isToday){
      d.innerHTML=`<input type="checkbox" class="week-cb" ${item.done?'checked':''} onchange="toggleWeek('${key}',${i})">
        <input type="text" class="week-label ${item.done?'done':''}" value="${esc(item.text)}"
          oninput="onWeekEdit('${key}',${i},this.value)"
          onkeydown="if(event.key==='Backspace'&&this.value===''){event.preventDefault();removeWeek('${key}',${i})}">`;
    } else {
      d.innerHTML=`<input type="checkbox" class="week-cb" ${item.done?'checked':''} disabled style="cursor:default"><div class="week-label ${item.done?'done':''}" style="cursor:default">${esc(item.text)}</div>`;
    }
    l.appendChild(d);
  });
  const cnt=document.getElementById(`week-count-${key}`);
  if(cnt)cnt.textContent=`${data.week.filter(w=>w.done).length} / ${data.week.length}`;
}

function onTodoEdit(key,i,val){const d=loadDay(key);d.today[i].text=val;saveDay(key,d);}
function onBacklogEdit(key,i,val){const d=loadDay(key);d.backlog[i]=val;saveDay(key,d);}
function onWeekEdit(key,i,val){const d=loadDay(key);d.week[i].text=val;saveDay(key,d);}
function onMemoInput(key,val){const d=loadDay(key);d.memo=val;saveDay(key,d);}
function toggleTodo(key,i){const d=loadDay(key);d.today[i].done=!d.today[i].done;saveDay(key,d);renderTodayList(key,d);renderTabs();}
function removeTodo(key,i){const d=loadDay(key);d.today.splice(i,1);saveDay(key,d);renderTodayList(key,d);renderTabs();}
function removeBacklog(key,i){const d=loadDay(key);d.backlog.splice(i,1);saveDay(key,d);renderBacklogList(key,d);}
function toggleWeek(key,i){const d=loadDay(key);d.week[i].done=!d.week[i].done;saveDay(key,d);renderWeekList(key,d);}
function removeWeek(key,i){const d=loadDay(key);d.week.splice(i,1);saveDay(key,d);renderWeekList(key,d);}
function addTodo(e,key){if(e.key!=='Enter')return;const inp=document.getElementById(`today-add-${key}`);const t=inp.value.trim();if(!t)return;const d=loadDay(key);d.today.push({text:t,done:false});saveDay(key,d);inp.value='';renderTodayList(key,d);renderTabs();}
function addBacklog(e,key){if(e.key!=='Enter')return;const inp=document.getElementById(`backlog-add-${key}`);const t=inp.value.trim();if(!t)return;const d=loadDay(key);d.backlog.push(t);saveDay(key,d);inp.value='';renderBacklogList(key,d);}
function addWeek(e,key){if(e.key!=='Enter')return;const inp=document.getElementById(`week-add-${key}`);const t=inp.value.trim();if(!t)return;const d=loadDay(key);d.week.push({text:t,done:false});saveDay(key,d);inp.value='';renderWeekList(key,d);}

async function runAI(){
  const prompt=document.getElementById('aiPrompt').value.trim();if(!prompt)return;
  const btn=document.getElementById('aiBtn'),status=document.getElementById('aiStatus');
  btn.disabled=true;status.className='ai-status loading';status.textContent='✦ 채우는 중...';
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      model:"claude-sonnet-4-20250514",max_tokens:1000,
      system:`플래너 AI. JSON만 출력:\n{"today":["할 일1","할 일2"],"backlog":["백로그1"]}\ntoday: 오늘 완료 가능 (최대6개, 15자이내), backlog: 나중에 (최대4개). 한국어.`,
      messages:[{role:"user",content:prompt}]
    })});
    const data=await res.json();
    const text=data.content?.[0]?.text||'';
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    const d=loadDay(todayKey);
    if(parsed.today?.length){parsed.today.forEach(t=>d.today.push({text:t,done:false}));document.getElementById(`today-ai-tag-${todayKey}`).style.display='inline-block';}
    if(parsed.backlog?.length){parsed.backlog.forEach(t=>d.backlog.push(t));document.getElementById(`backlog-ai-tag-${todayKey}`).style.display='inline-block';}
    saveDay(todayKey,d);renderTodayList(todayKey,d);renderBacklogList(todayKey,d);renderTabs();
    status.className='ai-status done';status.textContent=`✓ ${(parsed.today?.length||0)+(parsed.backlog?.length||0)}개 추가됨`;
    document.getElementById('aiPrompt').value='';
  }catch(e){status.className='ai-status';status.textContent='⚠ 오류. 다시 시도해줘.';console.error(e);}
  finally{btn.disabled=false;}
}

let rolloverSelected=new Set(),rolloverItems=[];
function getIncompletePastItems(){
  const results=[];
  buildDateList().forEach(key=>{
    if(key>=todayKey)return;
    loadDay(key).today.forEach(item=>{if(!item.done)results.push({text:item.text,fromKey:key});});
  });
  return results;
}
function renderRolloverTrigger(){
  const wrap=document.getElementById('rolloverTriggerWrap');if(!wrap)return;
  const items=getIncompletePastItems();
  if(items.length===0){wrap.innerHTML='';return;}
  wrap.innerHTML=`<button class="rollover-trigger-btn" onclick="openRollover()">↩ 과거 미완료 항목 이월하기<span class="rollover-count-badge">${items.length}</span></button>`;
}
function openRollover(){
  rolloverItems=getIncompletePastItems();
  rolloverSelected=new Set(rolloverItems.map((_,i)=>i));
  document.getElementById('rolloverModalSub').textContent=`${rolloverItems.length}개의 미완료 항목 발견`;
  const body=document.getElementById('rolloverModalBody');
  body.innerHTML=rolloverItems.map((item,i)=>{
    const d=keyToDate(item.fromKey),lbl=`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    return`<div class="rollover-item" onclick="toggleRolloverItem(${i})"><input type="checkbox" id="ri-${i}" checked onchange="event.stopPropagation();toggleRolloverItem(${i})"><span class="rollover-label">${esc(item.text)}</span><span class="rollover-from">${lbl}</span></div>`;
  }).join('');
  document.getElementById('rolloverModal').classList.add('open');
}
function toggleRolloverItem(i){const cb=document.getElementById(`ri-${i}`);if(rolloverSelected.has(i)){rolloverSelected.delete(i);if(cb)cb.checked=false;}else{rolloverSelected.add(i);if(cb)cb.checked=true;}}
function closeRollover(){document.getElementById('rolloverModal').classList.remove('open');}
function confirmRollover(){
  if(rolloverSelected.size===0){closeRollover();return;}
  const d=loadDay(todayKey);
  rolloverItems.forEach((item,i)=>{if(rolloverSelected.has(i))d.today.push({text:item.text,done:false});});
  saveDay(todayKey,d);closeRollover();renderPanels();renderTabs();
}
document.getElementById('rolloverModal').addEventListener('click',function(e){if(e.target===this)closeRollover();});

function renderStatsPanel(){
  const panel=document.getElementById('statsPanel');
  const days=[];
  for(let i=6;i>=0;i--){const dt=new Date(today);dt.setDate(today.getDate()-i);const key=dateKey(dt);const data=loadDay(key);days.push({key,dt,done:data.today.filter(t=>t.done).length,total:data.today.length,data});}
  const totalTasks=days.reduce((s,d)=>s+d.total,0),doneTasks=days.reduce((s,d)=>s+d.done,0);
  const completeDays=days.filter(d=>d.total>0&&d.done===d.total).length,activeDays=days.filter(d=>d.total>0).length;
  const rate=totalTasks>0?Math.round(doneTasks/totalTasks*100):0;
  const incomplete=[];
  days.forEach(d=>{if(d.key===todayKey)return;d.data.today.forEach(item=>{if(!item.done)incomplete.push({text:item.text,fromKey:d.key});});});
  panel.innerHTML=`
    <div class="header" style="border-radius:0 12px 12px 12px;border-top:none;margin-bottom:14px;">
      <div class="header-left">
        <div class="planner-title-wrap">
          <span style="font-size:28px">📊</span>
          <div class="planner-title-text">
            <div class="planner-title-main">WEEKLY REVIEW</div>
            <div class="planner-title-date">지난 7일 요약</div>
          </div>
        </div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-card-label">완료율</div><div class="stat-card-val accent">${rate}%</div><div class="stat-card-sub">${doneTasks} / ${totalTasks} 항목</div></div>
      <div class="stat-card"><div class="stat-card-label">완수한 날</div><div class="stat-card-val green">${completeDays}일</div><div class="stat-card-sub">활동 ${activeDays}일 중</div></div>
      <div class="stat-card"><div class="stat-card-label">총 완료</div><div class="stat-card-val">${doneTasks}</div><div class="stat-card-sub">이번 주 처리</div></div>
      <div class="stat-card"><div class="stat-card-label">미완료</div><div class="stat-card-val" style="color:var(--accent)">${totalTasks-doneTasks}</div><div class="stat-card-sub">이번 주 잔여</div></div>
    </div>
    <div class="week-bar-chart">
      <div class="week-bar-title">일별 할 일 현황</div>
      <div class="bar-chart-rows">
        ${days.map(d=>{
          const pct=d.total>0?Math.round(d.done/d.total*100):0,isFull=d.total>0&&d.done===d.total,isT=d.key===todayKey;
          return`<div class="bar-row"><div class="bar-day-label" style="${isT?'color:var(--accent);font-weight:700':''}">${DAYS_KO[d.dt.getDay()]}${isT?'*':''}</div><div class="bar-track"><div class="bar-fill ${isFull?'full':''}" style="width:${pct}%"></div></div><div class="bar-stat">${d.total===0?'–':`${d.done}/${d.total}`}</div></div>`;
        }).join('')}
      </div>
    </div>
    ${incomplete.length>0?`
    <div class="week-review-section">
      <div class="section-header"><div class="section-dot"></div><div class="section-title">이번 주 미완료 항목</div><div class="section-count">${incomplete.length}개</div></div>
      <div class="divider"></div>
      <div class="week-incomplete-list">
        ${incomplete.map(item=>{const d2=keyToDate(item.fromKey),lbl=`${String(d2.getMonth()+1).padStart(2,'0')}/${String(d2.getDate()).padStart(2,'0')}`;return`<div class="wk-item"><div class="wk-item-dot"></div><span style="flex:1;font-size:13px">${esc(item.text)}</span><span class="wk-item-from">${lbl}</span><button class="wk-move-btn" onclick="moveToToday('${esc(item.text)}',this)">+ 오늘로</button></div>`;}).join('')}
      </div>
    </div>`:`
    <div class="week-review-section">
      <div class="section-header"><div class="section-dot green"></div><div class="section-title">미완료 항목</div></div>
      <div class="divider"></div>
      <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-light);padding:8px 0">이번 주 미완료 항목 없어 👍</div>
    </div>`}`;
}
function moveToToday(text,btn){const d=loadDay(todayKey);d.today.push({text,done:false});saveDay(todayKey,d);btn.textContent='✓ 추가됨';btn.disabled=true;btn.style.opacity='.5';}

renderTabs();
renderPanels();
setTimeout(renderRolloverTrigger,50);
</script>
</body>
</html>
